<!DOCTYPE html>
<html>
<head>
    <title>CBE Online Application Form</title>
    <link rel="stylesheet" href="style.css">
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f7fa;
    margin: 0;
    padding: 0;
}

.container {
    width: 400px;
    margin: 50px auto;
    background-color: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    color: #003366;
}

label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background-color: #003366;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background-color: #0055aa;
}
</style>
</head>
<body>

    <div class="container">
        <h1>CBE Online Application</h1>

        <form>
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name">

            <label>Email Address</label>
            <input type="email" placeholder="Enter your email">

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number">

            <label>Programme</label>
            <select>
                <option>Diploma in Information Technology</option>
                <option>Bachelor of Business Administration</option>
                <option>Bachelor of Accounting</option>
                <option>Bachelor of Procurement and Supply</option>
            </select>

            <button type="submit">Apply Now</button>
        </form>
    </div>
<footer>
    <p align="center">This page is created by SAMWEL DANIEL JEREMIA Reg_no;01.8827.01.03.2025<p>
</footer>
</body>
</html>
